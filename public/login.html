<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign in · Expense Tracker</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body class="auth-page">
  <main class="auth-card">
    <div class="brand">
      <span class="brand-mark">₿</span>
      <h1>Expense Tracker</h1>
    </div>
    <p class="auth-sub" id="formSubtitle">Sign in to manage your expenses</p>

    <div class="tabs" role="tablist">
      <button class="tab active" id="tabLogin" type="button">Sign in</button>
      <button class="tab" id="tabRegister" type="button">Create account</button>
    </div>

    <form id="authForm" novalidate>
      <label for="email">Email</label>
      <input id="email" name="email" type="email" autocomplete="email" placeholder="you@example.com" required />

      <label for="password">Password</label>
      <input id="password" name="password" type="password" autocomplete="current-password" placeholder="At least 6 characters" required />

      <p class="error" id="authError" hidden></p>

      <button class="btn btn-primary btn-block" type="submit" id="submitBtn">Sign in</button>
    </form>

    <p class="auth-hint">Tip: create an account on first use — your data is private to your login.</p>
  </main>

  <script src="js/auth.js"></script>
</body>
</html>
