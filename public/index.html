<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Expense Tracker</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <header class="topbar">
    <div class="topbar-inner">
      <div class="brand">
        <span class="brand-mark">₿</span>
        <span class="brand-name">Expense Tracker</span>
      </div>
      <div class="topbar-right">
        <span class="user-email" id="userEmail"></span>
        <button class="btn btn-ghost" id="logoutBtn" type="button">Log out</button>
      </div>
    </div>
  </header>

  <main class="container">
    <!-- Summary cards -->
    <section class="cards">
      <div class="card stat">
        <span class="stat-label">Total spending</span>
        <span class="stat-value" id="statTotal">$0.00</span>
      </div>
      <div class="card stat">
        <span class="stat-label">Expenses</span>
        <span class="stat-value" id="statCount">0</span>
      </div>
      <div class="card stat">
        <span class="stat-label">Top category</span>
        <span class="stat-value" id="statTop">—</span>
      </div>
    </section>

    <div class="grid">
      <!-- Add / edit form -->
      <section class="card form-card">
        <h2 id="formTitle">Add expense</h2>
        <form id="expenseForm" novalidate>
          <input type="hidden" id="expenseId" />

          <label for="amount">Amount</label>
          <div class="input-prefix">
            <span>$</span>
            <input id="amount" type="number" step="0.01" min="0.01" placeholder="0.00" required />
          </div>

          <label for="category">Category</label>
          <select id="category" required>
            <option value="">Select a category…</option>
            <option>Food</option>
            <option>Transport</option>
            <option>Housing</option>
            <option>Utilities</option>
            <option>Entertainment</option>
            <option>Health</option>
            <option>Shopping</option>
            <option>Other</option>
          </select>

          <label for="date">Date</label>
          <input id="date" type="date" required />

          <label for="description">Description <span class="muted">(optional)</span></label>
          <input id="description" type="text" maxlength="500" placeholder="e.g. Lunch with team" />

          <p class="error" id="formError" hidden></p>

          <div class="form-actions">
            <button class="btn btn-primary" type="submit" id="saveBtn">Add expense</button>
            <button class="btn btn-ghost" type="button" id="cancelEditBtn" hidden>Cancel</button>
          </div>
        </form>
      </section>

      <!-- Chart -->
      <section class="card chart-card">
        <h2>Spending by category</h2>
        <div class="chart-wrap">
          <canvas id="categoryChart"></canvas>
        </div>
        <p class="empty" id="chartEmpty" hidden>No expenses yet — add one to see the breakdown.</p>
      </section>
    </div>

    <!-- Table -->
    <section class="card table-card">
      <div class="table-toolbar">
        <h2>Expenses</h2>
        <div class="toolbar-controls">
          <label class="sr-only" for="filterCategory">Filter by category</label>
          <select id="filterCategory">
            <option value="All">All categories</option>
            <option>Food</option>
            <option>Transport</option>
            <option>Housing</option>
            <option>Utilities</option>
            <option>Entertainment</option>
            <option>Health</option>
            <option>Shopping</option>
            <option>Other</option>
          </select>
          <button class="btn btn-secondary" id="exportBtn" type="button">Export CSV</button>
        </div>
      </div>

      <div class="table-scroll">
        <table id="expenseTable">
          <thead>
            <tr>
              <th>Date</th>
              <th>Category</th>
              <th>Description</th>
              <th class="num">Amount</th>
              <th class="actions-col">Actions</th>
            </tr>
          </thead>
          <tbody id="expenseRows"></tbody>
          <tfoot>
            <tr>
              <td colspan="3" class="foot-label">Total (filtered)</td>
              <td class="num" id="filteredTotal">$0.00</td>
              <td></td>
            </tr>
          </tfoot>
        </table>
      </div>
      <p class="empty" id="tableEmpty" hidden>No expenses match this filter.</p>
    </section>
  </main>

  <!-- Chart.js (CDN) -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <script src="js/api.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
