# Render Blueprint — FREE tier (demo only).
#
# To use this instead of the default render.yaml, rename it to render.yaml
# before connecting the repo as a Blueprint (Render only reads `render.yaml`):
#   git mv render.free.yaml render.yaml
#
# ⚠️  No persistent disk: Render's free plan has ephemeral storage, so the
# SQLite database (and all accounts/expenses) RESETS on every redeploy, restart,
# or when the free instance spins down after inactivity. Great for a quick demo,
# not for real data — use the paid disk in render.yaml for persistence.
services:
  - type: web
    name: personal-expense-tracker
    runtime: node
    plan: free
    buildCommand: npm ci
    startCommand: node server/index.js
    healthCheckPath: /login.html
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: "24"          # node:sqlite is built in and flag-free on Node 24
      - key: JWT_SECRET
        generateValue: true  # Render generates a strong random secret
      - key: DB_PATH
        value: ./data.db     # ephemeral on free tier — resets on restart
